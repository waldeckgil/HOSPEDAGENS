<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Nossas Suítes</title>
    <style>
        .bg-pousada {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-pousada text-white p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <h1 id="titulo-pousada" class="text-4xl font-extrabold mb-8 text-center drop-shadow-lg">Carregando Pousada...</h1>
        <div id="vitrine-container" class="grid gap-6"></div>
    </div>

    <!-- Modal de Reserva (Oculto) -->
    <div id="modal-reserva" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-lg text-gray-800 shadow-2xl">
            <h2 class="text-2xl font-bold mb-4 text-center">Solicitar Reserva</h2>
            <form id="form-reserva" class="space-y-3">
                <input type="hidden" id="suite-id-reserva">
                <input type="text" id="nome-hospede" placeholder="Nome Completo" required class="w-full p-3 border rounded-xl">
                <input type="text" id="whatsapp-hospede" placeholder="WhatsApp (DDD+Número)" required class="w-full p-3 border rounded-xl">
                <input type="text" id="cpf-hospede" placeholder="CPF" required class="w-full p-3 border rounded-xl">
                <input type="text" id="rg-hospede" placeholder="RG" required class="w-full p-3 border rounded-xl">
                <input type="text" id="endereco-hospede" placeholder="Endereço Completo com Bairro" required class="w-full p-3 border rounded-xl">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="checkin" required class="w-full p-3 border rounded-xl">
                    <input type="date" id="checkout" required class="w-full p-3 border rounded-xl">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="fecharModal()" class="w-full bg-gray-300 p-3 rounded-xl font-bold">Cancelar</button>
                    <button type="submit" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Nome alterado para 'supabaseClient' para evitar conflito com a global da biblioteca
        const supabaseClient = supabase.createClient('https://evrkniykafvydnhxycit.supabase.co', 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs');

        async function carregarDados() {
            const params = new URLSearchParams(window.location.search);
            const pousadaId = params.get('pousada_id') || '2ce55615-0d32-467a-a412-f9868ec8c9cf';

            // Carrega nome da pousada
            const { data: pousada } = await supabaseClient.from('pousadas').select('nome').eq('id', pousadaId).single();
            document.getElementById('titulo-pousada').innerText = pousada?.nome || "Nossa Pousada";

            // Carrega suítes disponíveis
            const { data: suites } = await supabaseClient.from('suites').select('*').eq('pousada_id', pousadaId).eq('status', 'Disponível');
            const container = document.getElementById('vitrine-container');
            
            container.innerHTML = (suites && suites.length > 0) ? '' : '<p class="text-center">Nenhuma suíte disponível no momento.</p>';
            
            if (suites) {
                suites.forEach(suite => {
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-2xl shadow-lg border-l-8 border-green-500 flex justify-between items-center text-gray-800">
                            <h2 class="text-xl font-bold">${suite.nome}</h2>
                            <button onclick="abrirModal('${suite.id}', '${pousadaId}')" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl transition">Solicitar</button>
                        </div>
                    `;
                });
            }
        }

        function abrirModal(sId, pId) {
            document.getElementById('suite-id-reserva').value = sId;
            document.getElementById('modal-reserva').classList.remove('hidden');
        }
        function fecharModal() { document.getElementById('modal-reserva').classList.add('hidden'); }

        document.getElementById('form-reserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.from('reservas').insert([{
                suite_id: document.getElementById('suite-id-reserva').value,
                hospede_nome: document.getElementById('nome-hospede').value,
                whatsapp_hospede: document.getElementById('whatsapp-hospede').value,
                cpf: document.getElementById('cpf-hospede').value,
                rg: document.getElementById('rg-hospede').value,
                endereco: document.getElementById('endereco-hospede').value,
                checkin: document.getElementById('checkin').value,
                checkout: document.getElementById('checkout').value,
                status: 'Pendente'
            }]);
            
            if (error) {
                alert("Erro ao enviar solicitação: " + error.message);
            } else { 
                alert("Solicitação enviada com sucesso!"); 
                fecharModal(); 
                carregarDados();
            }
        });

        carregarDados();
    </script>
</body>
</html>
