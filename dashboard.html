<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pousadas</title>
    <!-- SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <!-- Barra de Navegação do Gestor -->
    <nav class="bg-white shadow-md p-6 mb-8 rounded-2xl flex justify-between items-center">
        <div class="flex gap-8 font-bold text-gray-700">
            <a href="dashboard.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Minhas Suítes</a>
            <a href="reservas.html" class="hover:text-blue-600 transition">Ver Reservas</a>
            <a href="configurar-pousada.html" class="hover:text-blue-600 transition">Minha Pousada</a>
        </div>
        <div class="flex items-center gap-4">
            <span id="titulo-pousada" class="font-bold text-gray-800">Carregando...</span>
            <button onclick="fazerLogout()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-xl transition">
                Sair
            </button>
        </div>
    </nav>

    <!-- Exibição de Data e Hora -->
    <div id="data-atual" class="mb-6 text-gray-600 font-medium text-center"></div>

    <div id="suites-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <script>
        // --- CONFIGURAÇÕES ---
        const SUPABASE_URL = 'https://evrkniykafvydnhxycit.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Exibir Data e Hora
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('data-atual').innerText = agora.toLocaleString('pt-BR', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });
        }
        setInterval(atualizarRelogio, 60000);
        atualizarRelogio();

        async function iniciarApp() {
            const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
            if (sessionError || !session) { window.location.href = 'index.html'; return; }
            await carregarInfoPousada(session.user.id);
            carregarDashboard();
        }

        async function carregarInfoPousada(userId) {
            const { data: pousada, error } = await supabaseClient.from('pousadas').select('nome').eq('id', userId).single();
            const titulo = document.getElementById('titulo-pousada');
            if (pousada) titulo.innerText = "Pousada: " + pousada.nome;
        }

        async function carregarDashboard() {
            // Buscando suítes
            const { data: suites, error } = await supabaseClient.from('suites').select('*');
            if (error) { console.error(error); return; }

            const container = document.getElementById('suites-container');
            container.innerHTML = '';

            suites.forEach(suite => {
                const classes = { 'Pendente': 'bg-yellow-200 border-yellow-500', 'Ocupada': 'bg-gray-300 border-gray-600', 'Disponível': 'bg-green-200 border-green-500', 'Limpeza': 'bg-red-200 border-red-500' };
                const cor = classes[suite.status] || 'bg-white border-gray-200';

                container.innerHTML += `
                    <div class="p-6 rounded-lg shadow-md border-l-8 ${cor} cursor-pointer hover:shadow-xl transition" onclick="alert('Funcionalidade de edição em breve')">
                        <h2 class="text-xl font-bold">${suite.nome}</h2>
                        <p class="text-sm mt-2">Status: <strong>${suite.status}</strong></p>
                    </div>
                `;
            });
        }

        async function fazerLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        iniciarApp();
    </script>
</body>
</html>
