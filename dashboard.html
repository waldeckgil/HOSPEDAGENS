<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pousadas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <nav class="bg-white shadow-md p-6 mb-8 rounded-2xl flex justify-between items-center">
        <div class="flex gap-8 font-bold text-gray-700">
            <a href="dashboard.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Minhas Suítes</a>
            <a href="reservas.html" class="hover:text-blue-600 transition">Ver Reservas</a>
            <a href="configurar-pousada.html" class="hover:text-blue-600 transition">Minha Pousada</a>
        </div>
        <div class="flex items-center gap-4">
            <span id="titulo-pousada" class="font-bold text-gray-800">Carregando Pousada...</span>
            <button onclick="fazerLogout()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-xl transition">Sair</button>
        </div>
    </nav>

    <div id="data-atual" class="mb-6 text-gray-600 font-medium text-center"></div>
    <div id="suites-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Modal de Edição -->
    <div id="modal-edicao" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-lg shadow-2xl">
            <h2 id="modal-titulo" class="text-2xl font-bold mb-4 text-blue-600">Editando Suíte...</h2>
            <form id="form-edicao" class="space-y-3">
                <input type="hidden" id="edit-suite-id">
                <select id="edit-status" class="w-full p-3 border rounded-xl font-bold bg-gray-50">
                    <option value="Disponível">Disponível</option>
                    <option value="Ocupada">Ocupada</option>
                    <option value="Limpeza">Limpeza</option>
                    <option value="Pendente">Pendente</option>
                </select>
                <input type="text" id="edit-hospede" placeholder="Nome do Hóspede" class="w-full p-3 border rounded-xl">
                <input type="text" id="edit-whatsapp" placeholder="WhatsApp (DDD+Número)" class="w-full p-3 border rounded-xl">
                <input type="number" id="edit-valor" placeholder="Valor Total (R$)" class="w-full p-3 border rounded-xl">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="edit-checkin" class="p-3 border rounded-xl" title="Check-in">
                    <input type="date" id="edit-checkout" class="p-3 border rounded-xl" title="Check-out">
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="fecharModal()" class="w-full bg-gray-300 p-3 rounded-xl font-bold">Cancelar</button>
                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://evrkniykafvydnhxycit.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- Função do Relógio ---
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('data-atual').innerText = agora.toLocaleString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        setInterval(atualizarRelogio, 60000);
        atualizarRelogio();

        // --- Função Principal: Carregar Suites e Reservas ---
        async function carregarDashboard() {
            // Busca suites e inclui os dados da reserva relacionada
            const { data: suites, error } = await supabaseClient
                .from('suites')
                .select(`
                    id,
                    nome,
                    status,
                    reservas (
                        hospede_nome,
                        checkin,
                        checkout,
                        valor_total,
                        whatsapp_hospede,
                        status
                    )
                `);

            if (error) {
                console.error("Erro ao buscar suites:", error);
                document.getElementById('suites-container').innerHTML = '<p class="text-red-500 text-center col-span-3">Erro ao carregar dados. Verifique o console.</p>';
                return;
            }

            const container = document.getElementById('suites-container');
            container.innerHTML = '';

            suites.forEach(suite => {
                // Filtra a reserva 'Aprovada' dentro do array retornado pelo join
                const reservaAtiva = suite.reservas ? suite.reservas.find(r => r.status === 'Aprovada') : null;
                
                const corClasses = {
                    'Disponível': 'bg-green-200 border-green-500',
                    'Ocupada': 'bg-gray-300 border-gray-600',
                    'Limpeza': 'bg-red-200 border-red-500',
                    'Pendente': 'bg-yellow-200 border-yellow-500'
                };
                
                const cor = corClasses[suite.status] || 'bg-white border-gray-200';
                
                let infoExtra = reservaAtiva ? `
                    <div class="mt-3 text-xs bg-black/10 p-2 rounded">
                        <p><strong>Hóspede:</strong> ${reservaAtiva.hospede_nome}</p>
                        <p><strong>Saída:</strong> ${new Date(reservaAtiva.checkout + 'T00:00:00').toLocaleDateString('pt-BR')}</p>
                    </div>` : '';

                // Passa os dados da reserva para o abrirModal como JSON string escapado
                const reservaJson = reservaAtiva ? JSON.stringify(reservaAtiva).replace(/"/g, '&quot;') : '';

                container.innerHTML += `
                    <div class="p-6 rounded-lg shadow-md border-l-8 ${cor} cursor-pointer hover:shadow-xl transition" 
                         onclick="abrirModal('${suite.id}', '${suite.nome}', '${reservaJson}', '${suite.status}')">
                        <h2 class="text-xl font-bold">${suite.nome}</h2>
                        <p class="text-sm mt-2">Status: <strong>${suite.status}</strong></p>
                        ${infoExtra}
                    </div>
                `;
            });
        }

        // --- Funções do Modal ---
        function abrirModal(id, nome, reservaData, status) {
            document.getElementById('modal-titulo').innerText = "Editando: " + nome;
            document.getElementById('edit-suite-id').value = id;
            document.getElementById('edit-status').value = status;
            
            // Reseta os campos do formulário primeiro
            document.getElementById('edit-hospede').value = '';
            document.getElementById('edit-whatsapp').value = '';
            document.getElementById('edit-valor').value = '';
            document.getElementById('edit-checkin').value = '';
            document.getElementById('edit-checkout').value = '';

            if (reservaData) {
                try {
                    const res = JSON.parse(reservaData.replace(/&quot;/g, '"'));
                    document.getElementById('edit-hospede').value = res.hospede_nome || '';
                    document.getElementById('edit-whatsapp').value = res.whatsapp_hospede || '';
                    document.getElementById('edit-valor').value = res.valor_total || '';
                    document.getElementById('edit-checkin').value = res.checkin || '';
                    document.getElementById('edit-checkout').value = res.checkout || '';
                } catch (e) {
                    console.error("Erro ao parsear dados da reserva:", e);
                }
            }
            document.getElementById('modal-edicao').classList.remove('hidden');
        }

        function fecharModal() {
            document.getElementById('modal-edicao').classList.add('hidden');
        }

        // --- Função de Salvar (Submit do Form) ---
        document.getElementById('form-edicao').onsubmit = async (e) => {
            e.preventDefault();
            const suiteId = document.getElementById('edit-suite-id').value;
            const novoStatus = document.getElementById('edit-status').value;
            
            // 1. Atualiza Status da Suíte na tabela 'suites'
            const { error: errSuite } = await supabaseClient
                .from('suites')
                .update({ status: novoStatus })
                .eq('id', suiteId);

            if (errSuite) { console.error("Erro ao atualizar suite:", errSuite); alert("Erro ao atualizar suíte."); return; }

            // 2. Prepara os dados da reserva (para upsert)
            const dadosReserva = {
                suite_id: suiteId,
                hospede_nome: document.getElementById('edit-hospede').value,
                whatsapp_hospede: document.getElementById('edit-whatsapp').value,
                valor_total: document.getElementById('edit-valor').value || null, // Garante null se vazio
                checkin: document.getElementById('edit-checkin').value || null,
                checkout: document.getElementById('edit-checkout').value || null,
                status: 'Aprovada' // Reserva gerenciada pelo dashboard é sempre 'Aprovada'
            };

            // 3. Atualiza ou Insere Reserva na tabela 'reservas' (USANDO UPSERT)
            // O 'onConflict: 'suite_id'' é OBRIGATÓRIO para o upsert funcionar com a nova constraint
            const { error: errReserva } = await supabaseClient
                .from('reservas')
                .upsert(dadosReserva, { onConflict: 'suite_id' });
            
            if (errReserva) {
                console.error("Erro ao salvar reserva:", errReserva);
                alert("Suíte atualizada, mas erro ao salvar reserva. Verifique se o CPF/RG do hóspede existe.");
            } else {
                alert("Suíte e reserva atualizadas com sucesso!");
            }
            
            fecharModal();
            carregarDashboard(); // Recarrega a tela
        };

        // --- Logout ---
        async function fazerLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        // --- Inicialização: Verificar Sessão e Carregar Nome da Pousada ---
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (!session) {
                // Se não houver sessão, volta para o login
                window.location.href = 'index.html';
                return;
            }

            // Busca o nome da pousada usando o ID do usuário logado
            const { data: pousada, error } = await supabaseClient
                .from('pousadas')
                .select('nome')
                .eq('id', session.user.id)
                .single();

            if (pousada) {
                document.getElementById('titulo-pousada').innerText = "Pousada: " + pousada.nome;
            } else {
                document.getElementById('titulo-pousada').innerText = "Pousada não configurada";
                console.error("Erro ao buscar nome da pousada:", error);
            }

            // Carrega os dados das suítes e reservas
            carregarDashboard();
        })();
    </script>
</body>
</html>
