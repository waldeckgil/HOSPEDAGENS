<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pousadas</title>
    <!-- SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div id="suites-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <script>
        // --- SUAS CONFIGURAÇÕES ---
        const SUPABASE_URL = 'https://evrkniykafvydnhxycit.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs';

        // Inicialização
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função para iniciar o app com login automático
        async function iniciarApp() {
            console.log("Tentando realizar login...");
            
            const { data, error: loginError } = await supabaseClient.auth.signInWithPassword({
                email: 'waldeckgil@gmail.com',
                password: 'Dibico@20' // <-- SUBSTITUA PELA SENHA REAL
            });

            if (loginError) {
                console.error("Erro no login:", loginError.message);
                document.getElementById('suites-container').innerHTML = `<p class="text-red-600">Erro de autenticação: ${loginError.message}</p>`;
                return;
            }

            console.log("Login realizado com sucesso!");
            carregarDashboard();
        }

        // Função que carrega os dados após o login
        async function carregarDashboard() {
            // Agora, com o usuário logado, o RLS validará o acesso baseado no auth.uid()
            const { data: suites, error } = await supabaseClient.from('suites').select('*');

            if (error) { 
                console.error("Erro ao carregar dados (RLS):", error); 
                return; 
            }

            const container = document.getElementById('suites-container');
            container.innerHTML = '';

            if (suites.length === 0) {
                container.innerHTML = '<p>Nenhuma suíte encontrada para este gestor.</p>';
                return;
            }

            suites.forEach(suite => {
                const classes = {
                    'Pendente': 'bg-yellow-200 border-yellow-500',
                    'Ocupada': 'bg-gray-300 border-gray-600',
                    'Disponível': 'bg-green-200 border-green-500',
                    'Limpeza': 'bg-red-200 border-red-500'
                };

                const cor = classes[suite.status] || 'bg-white border-gray-200';

                container.innerHTML += `
                    <div class="p-6 rounded-lg shadow-md border-l-8 ${cor}">
                        <h2 class="text-xl font-bold">${suite.nome}</h2>
                        <p class="text-sm mt-2">Status: <strong>${suite.status}</strong></p>
                    </div>
                `;
            });
        }

        // Iniciar o fluxo
        iniciarApp();
    </script>
</body>
</html>
