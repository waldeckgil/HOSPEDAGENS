<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Suítes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <!-- Navegação Superior Aprimorada -->
    <nav class="bg-white shadow-md p-6 mb-8 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex flex-wrap gap-6 font-bold text-gray-700 items-center">
            <a href="dashboard.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Gestão de Suítes</a>
            <a href="reservas.html" class="hover:text-blue-600 transition">Ver Reservas (Pendentes)</a>
            <a href="configurar-pousada.html" class="hover:text-blue-600 transition">Minha Pousada</a>
            <!-- Atalhos da Vitrine -->
            <button onclick="copiarLinkVitrine()" class="bg-emerald-100 text-emerald-800 hover:bg-emerald-200 px-3 py-1.5 rounded-xl text-sm transition font-semibold flex items-center gap-1.5">
                🔗 Copiar Link da Vitrine
            </button>
            <a id="link-ver-vitrine" href="#" target="_blank" class="bg-blue-50 text-blue-700 hover:bg-blue-100 px-3 py-1.5 rounded-xl text-sm transition font-semibold flex items-center gap-1.5">
                👁️ Ver Vitrine (Visão Hóspede)
            </a>
        </div>
        <div class="flex items-center gap-4">
            <span id="titulo-pousada" class="font-bold text-gray-800">Carregando...</span>
            <button onclick="fazerLogout()" class="bg-red-600 text-white font-bold py-2 px-4 rounded-xl">Sair</button>
        </div>
    </nav>

    <div id="suites-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Modal de Edição -->
    <div id="modal-edicao" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl w-full max-w-lg shadow-2xl">
            <h2 id="modal-titulo" class="text-2xl font-bold mb-4 text-blue-600">Editando Suíte</h2>
            <form id="form-edicao" class="space-y-3">
                <input type="hidden" id="edit-suite-id">
                
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Status da Suíte</label>
                    <select id="edit-status" class="w-full p-3 border rounded-xl font-bold bg-gray-50" onchange="verificarStatusModal()">
                        <option value="Disponível">Disponível</option>
                        <option value="Ocupada">Ocupada</option>
                        <option value="Limpeza">Limpeza</option>
                        <option value="Pendente">Pendente</option>
                    </select>
                </div>

                <div id="campos-hospede-container" class="space-y-3 transition-all">
                    <div class="grid grid-cols-1 gap-2">
                        <input type="text" id="edit-hospede" placeholder="Nome Hóspede" class="p-3 border rounded-xl">
                        <input type="text" id="edit-whatsapp" placeholder="WhatsApp" class="p-3 border rounded-xl">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="edit-cpf" placeholder="CPF (Opcional)" class="p-3 border rounded-xl">
                            <input type="text" id="edit-rg" placeholder="RG (Opcional)" class="p-3 border rounded-xl">
                        </div>
                    </div>

                    <!-- Campos de Data com Rótulos Claros -->
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Data de Check-in</label>
                            <input type="date" id="edit-checkin" class="w-full p-3 border rounded-xl bg-white">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">Data de Check-out</label>
                            <input type="date" id="edit-checkout" class="w-full p-3 border rounded-xl bg-white">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold mt-4 transition">Salvar Alterações</button>
                <button type="button" onclick="fecharModal()" class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 p-3 rounded-xl font-bold mt-2 transition">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient('https://evrkniykafvydnhxycit.supabase.co', 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs');

        let usuarioIdAtual = null;

        async function carregarPousada() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return;
            usuarioIdAtual = user.id;

            const { data: pousada } = await supabaseClient.from('pousadas').select('nome').eq('id', user.id).single();
            if (pousada) {
                document.getElementById('titulo-pousada').innerText = "Pousada: " + pousada.nome;
            } else {
                document.getElementById('titulo-pousada').innerText = "Minha Pousada";
            }

            // Configura dinamicamente o link da vitrine com o ID da pousada logada
            const urlVitrine = window.location.origin + `/vitrine.html?pousada_id=${user.id}`;
            document.getElementById('link-ver-vitrine').href = urlVitrine;
        }

        function copiarLinkVitrine() {
            if (!usuarioIdAtual) {
                alert("Aguarde o carregamento dos dados da pousada.");
                return;
            }
            const urlVitrine = window.location.origin + `/vitrine.html?pousada_id=${usuarioIdAtual}`;
            navigator.clipboard.writeText(urlVitrine).then(() => {
                alert("Link da vitrine copiado para a área de transferência! Envie para o seu hóspede.");
            }).catch(err => {
                console.error("Erro ao copiar link: ", err);
                prompt("Copie o link abaixo:", urlVitrine);
            });
        }

        async function carregarDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }

            carregarPousada();

            const { data: suites, error } = await supabaseClient
                .from('suites')
                .select('*')
                .eq('pousada_id', user.id);

            if (error) { console.error("Erro ao carregar suítes:", error); return; }

            const { data: reservas } = await supabaseClient
                .from('reservas')
                .select('*')
                .eq('pousada_id', user.id);

            const container = document.getElementById('suites-container');
            container.innerHTML = '';

            suites.forEach(suite => {
                const res = (suite.status === 'Ocupada' && reservas) ? reservas.find(r => r.suite_id === suite.id) : null;
                
                const corClasses = {
                    'Disponível': 'bg-green-50 border-green-500 text-green-900', 
                    'Ocupada': 'bg-gray-100 border-gray-600 text-gray-900', 
                    'Limpeza': 'bg-red-50 border-red-500 text-red-900', 
                    'Pendente': 'bg-yellow-50 border-yellow-500 text-yellow-900'
                };
                
                const formatarData = (dataStr) => {
                    if (!dataStr) return 'N/A';
                    const partes = dataStr.split('-');
                    if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
                    return dataStr;
                };

                const cardClass = corClasses[suite.status] || 'bg-white border-gray-300';
                
                container.innerHTML += `
                    <div class="p-6 rounded-2xl shadow-md border-l-8 ${cardClass} flex flex-col justify-between transition hover:shadow-lg cursor-pointer" 
                         onclick="abrirModal('${suite.id}', '${suite.nome}', ${JSON.stringify(res || {}).replace(/"/g, '&quot;')}, '${suite.status}')">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h2 class="text-xl font-bold">${suite.nome}</h2>
                                <span class="px-3 py-1 rounded-full text-xs font-extrabold uppercase shadow-sm ${
                                    suite.status === 'Disponível' ? 'bg-green-200 text-green-800' :
                                    suite.status === 'Ocupada' ? 'bg-gray-300 text-gray-800' :
                                    suite.status === 'Limpeza' ? 'bg-red-200 text-red-800' : 'bg-yellow-200 text-yellow-800'
                                }">
                                    ${suite.status}
                                </span>
                            </div>

                            ${res && res.hospede_nome ? `
                                <div class="mt-4 pt-3 border-t border-black/10 text-sm space-y-1.5">
                                    <p class="flex items-center gap-1.5">
                                        <span class="font-semibold text-gray-600">Hóspede:</span> 
                                        <span class="font-bold text-gray-900 truncate">${res.hospede_nome}</span>
                                    </p>
                                    <p class="flex items-center gap-1.5">
                                        <span class="font-semibold text-gray-600">WhatsApp:</span> 
                                        <span>${res.whatsapp_hospede || 'Não informado'}</span>
                                    </p>
                                    <div class="grid grid-cols-2 gap-2 mt-2 pt-2 border-t border-black/5 text-xs">
                                        <p><span class="text-gray-500">Check-in:</span> <strong class="text-gray-800">${formatarData(res.checkin)}</strong></p>
                                        <p><span class="text-gray-500">Check-out:</span> <strong class="text-gray-800">${formatarData(res.checkout)}</strong></p>
                                    </div>
                                </div>
                            ` : `
                                <div class="mt-4 pt-3 border-t border-black/10 text-xs text-gray-500 italic">
                                    Nenhuma reserva ativa vinculada no momento.
                                </div>
                            `}
                        </div>

                        <div class="mt-5 pt-3 flex justify-end">
                            <span class="text-xs font-bold text-blue-600 hover:underline">
                                Gerenciar / Editar &rarr;
                            </span>
                        </div>
                    </div>`;
            });
        }
        
        function abrirModal(id, nome, reserva, status) {
            document.getElementById('edit-suite-id').value = id;
            document.getElementById('edit-status').value = status;
            document.getElementById('edit-hospede').value = reserva.hospede_nome || '';
            document.getElementById('edit-whatsapp').value = reserva.whatsapp_hospede || '';
            document.getElementById('edit-cpf').value = reserva.cpf || '';
            document.getElementById('edit-rg').value = reserva.rg || '';
            document.getElementById('edit-checkin').value = reserva.checkin || '';
            document.getElementById('edit-checkout').value = reserva.checkout || '';
            
            verificarStatusModal();
            document.getElementById('modal-edicao').classList.remove('hidden');
        }

        function verificarStatusModal() {
            const status = document.getElementById('edit-status').value;
            const containerCampos = document.getElementById('campos-hospede-container');
            if (status !== 'Ocupada') {
                containerCampos.classList.add('opacity-50');
            } else {
                containerCampos.classList.remove('opacity-50');
            }
        }

        function fecharModal() { document.getElementById('modal-edicao').classList.add('hidden'); }

        document.getElementById('form-edicao').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('edit-status').value;
            const suiteId = document.getElementById('edit-suite-id').value;
            
            if (status === 'Ocupada' && !document.getElementById('edit-hospede').value) {
                alert("Erro: Informe o nome do hóspede!"); return;
            }

            const { data: { user } } = await supabaseClient.auth.getUser();
            
            const { error: errSuite } = await supabaseClient.from('suites').update({ status }).eq('id', suiteId);
            if (errSuite) {
                alert("Erro ao atualizar suíte: " + errSuite.message);
                return;
            }

            const dadosReserva = (status === 'Ocupada') ? {
                suite_id: suiteId, 
                pousada_id: user.id,
                hospede_nome: document.getElementById('edit-hospede').value || null,
                whatsapp_hospede: document.getElementById('edit-whatsapp').value || null,
                cpf: document.getElementById('edit-cpf').value || null,
                rg: document.getElementById('edit-rg').value || null,
                checkin: document.getElementById('edit-checkin').value || null,
                checkout: document.getElementById('edit-checkout').value || null
            } : {
                suite_id: suiteId, 
                pousada_id: user.id,
                hospede_nome: null,
                whatsapp_hospede: null,
                cpf: null,
                rg: null,
                checkin: null,
                checkout: null
            };

            const { error: errReserva } = await supabaseClient.from('reservas').upsert(dadosReserva, { onConflict: 'suite_id' });

            if (errReserva) {
                alert("Erro ao salvar reserva: " + errReserva.message);
            } else {
                alert("Alterações salvas com sucesso!"); 
                fecharModal(); 
                carregarDashboard();
            }
        };

        async function fazerLogout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }
        
        carregarDashboard();
    </script>
</body>
</html>
