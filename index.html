<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carregando a biblioteca do Supabase explicitamente -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Login - Gestor de Pousadas</title>
    <style>
        .bg-fundo-pousada {
            background-image: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.8)), url('https://investidorsardinha.r7.com/wp-content/uploads/2020/12/tipos-de-empresa-as-7-modalidades-existentes-caracteristicas-e-portes-3-1024x644.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="bg-fundo-pousada flex items-center justify-center h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-2xl w-96 border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Bem-vindo</h2>
            <p class="text-gray-500 text-sm mt-2">Acesse o painel da sua pousada</p>
        </div>

        <!-- Formulário de login -->
        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input id="email" type="email" class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="seu@email.com" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
                <input id="password" type="password" class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold text-lg transition duration-300 shadow-lg shadow-blue-200">
                Entrar
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-600">Não possui conta? 
                <a href="cadastro.html" class="text-blue-600 font-bold hover:text-blue-800 transition">Cadastre sua Pousada</a>
            </p>
        </div>
    </div>

    <script>
        // Garante que o objeto global do Supabase está disponível antes de instanciar
        const SUPABASE_URL = 'https://evrkniykafvydnhxycit.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs';
        
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (err) {
            console.error("Erro ao inicializar o cliente Supabase:", err);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!supabaseClient) {
                alert("Erro crítico: Biblioteca do Supabase não foi carregada corretamente.");
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Primeiro, fazemos logout de qualquer sessão residual para limpar o cache
                await supabaseClient.auth.signOut();

                // Faz o login com as credenciais digitadas[cite: 11]
                const response = await supabaseClient.auth.signInWithPassword({ email, password });
                const data = response.data;
                const error = response.error;

                if (error) {
                    alert("Erro ao fazer login: " + error.message);
                } else {
                    console.log("Login efetuado com sucesso para:", data.user.email);[cite: 11]
                    window.location.href = 'dashboard.html';[cite: 11]
                }
            } catch (err) {
                console.error("Erro na execução do login:", err);
                alert("Ocorreu um erro inesperado durante o login.");
            }
        });
    </script>
</body>
</html>
