<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login - Gestor de Pousadas</title>
    <style>
        /* CSS customizado para garantir que o fundo fique perfeito */
        .bg-fundo-pousada {
            /* Insira o link da sua imagem abaixo */
            background-image: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.8)), url('https://investidorsardinha.r7.com/wp-content/uploads/2020/12/tipos-de-empresa-as-7-modalidades-existentes-caracteristicas-e-portes-3-1024x644.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<!-- Aplicamos a classe customizada que criamos acima -->
<body class="bg-fundo-pousada flex items-center justify-center h-screen">

    <!-- Card de login (permanece o mesmo) -->
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-96 border border-gray-100">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Bem-vindo</h2>
            <p class="text-gray-500 text-sm mt-2">Acesse o painel da sua pousada</p>
        </div>

        <form action="dashboard.html" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Código da Pousada</label>
                <input type="text" class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Ex: Pousada001" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
                <input type="password" class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required pattern="[a-zA-Z0-9]{7,}">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold text-lg transition duration-300 shadow-lg shadow-blue-200">
                Entrar
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-600">Não possui conta? 
                <a href="#" class="text-blue-600 font-bold hover:text-blue-800 transition">Cadastre sua Pousada</a>
            </p>
        </div>
    </div>
</body>
</html>
