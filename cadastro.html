<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carrega a biblioteca do Supabase (cria a variável global 'supabase') -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Cadastro - Gestor de Pousadas</title>
    <style>
        .bg-fundo-pousada {
            background-image: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.8)), url('https://investidorsardinha.r7.com/wp-content/uploads/2020/12/tipos-de-empresa-as-7-modalidades-existentes-caracteristicas-e-portes-3-1024x644.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-fundo-pousada flex items-center justify-center h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-2xl w-96 border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Criar Conta</h2>
            <p class="text-gray-500 text-sm mt-2">Comece a gerenciar sua pousada</p>
        </div>

        <form id="signup-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input id="email" type="email" class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="seu@email.com" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
                <input id="password" type="password" class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required>
                <p id="password-help" class="text-xs text-gray-400 mt-1">Mínimo de 6 caracteres.</p>
            </div>
            
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl font-bold text-lg transition duration-300 shadow-lg shadow-green-200">
                Cadastrar Pousada
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-600">Já possui conta? 
                <a href="index.html" class="text-blue-600 font-bold hover:text-blue-800 transition">Faça Login</a>
            </p>
        </div>
    </div>

    <script>
        // Aguarda o carregamento completo da página e da biblioteca do Supabase
        window.onload = function() {
            
            // Variáveis de ambiente do seu projeto
            const SUPABASE_URL = 'https://evrkniykafvydnhxycit.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs';
            
            // Inicializa o cliente explicitamente para garantir que 'supabase' esteja definida
            // É recomendado usar um nome de variável diferente (ex: supabaseClient) para evitar conflitos globais.
            // Mas para simplificar e usar o seu nome, faremos assim:
            window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            document.getElementById('signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                // Validação de senha mínima (opcional mas recomendada)
                if (password.length < 6) {
                    alert('A senha deve ter pelo menos 6 caracteres.');
                    return;
                }

                // Usa a instância global 'supabase' que acabamos de inicializar
                const { data, error } = await window.supabase.auth.signUp({ email, password });

                if (error) {
                    alert('Erro no cadastro: ' + error.message);
                } else {
                    alert('Cadastro realizado! Agora vamos configurar sua pousada.');
                    window.location.href = 'configurar-pousada.html';
                }
            });
        };
    </script>
</body>
</html>
