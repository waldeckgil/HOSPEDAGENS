<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Painel do Gestor</title>
    <style>
        body {
            background-image: url('https://investidorsardinha.r7.com/wp-content/uploads/2020/12/tipos-de-empresa-as-7-modalidades-existentes-caracteristicas-e-portes-3-1024x644.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Dashboard de Suítes</h1>
        <!-- Grade responsiva de cards de suítes -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <!-- Card Amarelo: Solicitação Pendente -->
            <div class="bg-yellow-200 p-6 rounded-lg shadow-md border-l-8 border-yellow-500">
                <h2 class="text-xl font-bold">Suíte Master</h2>
                <p class="text-sm mt-2">Status: <strong>Pendente</strong></p>
                <button class="mt-4 bg-yellow-600 text-white px-4 py-2 rounded">Ver Reserva</button>
            </div>

            <!-- Card Cinza: Suíte Ocupada -->
            <div class="bg-gray-300 p-6 rounded-lg shadow-md border-l-8 border-gray-600">
                <h2 class="text-xl font-bold">Suíte Varanda</h2>
                <p class="text-sm mt-2">Status: <strong>Ocupada</strong></p>
                <button class="mt-4 bg-gray-600 text-white px-4 py-2 rounded" disabled>Indisponível</button>
            </div>

            <!-- Card Verde: Suíte Disponível -->
            <div class="bg-green-200 p-6 rounded-lg shadow-md border-l-8 border-green-500">
                <h2 class="text-xl font-bold">Suíte Luxo</h2>
                <p class="text-sm mt-2">Status: <strong>Disponível</strong></p>
                <button class="mt-4 bg-green-600 text-white px-4 py-2 rounded">Nova Reserva</button>
            </div>

            <!-- Card Vermelho: Pendente de Limpeza -->
            <div class="bg-red-200 p-6 roundedlg shadow-md border-l-8 border-red-500">
                <h2 class="text-xl font-bold">Suíte Família</h2>
                <p class="text-sm mt-2">Status: <strong>Pendente Limpeza</strong></p>
                <button class="mt-4 bg-red-600 text-white px-4 py-2 rounded">Liberar Suíte</button>
            </div>
        </div>
    </div>
</body>
</html>
