<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Reserva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carregando o SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Solicitar Reserva</h2>
        
        <form id="reserva-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Seu Nome</label>
                <input type="text" id="nome" class="w-full p-3 border rounded-xl" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Email</label>
                <input type="email" id="email" class="w-full p-3 border rounded-xl" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Check-in</label>
                    <input type="date" id="checkin" class="w-full p-3 border rounded-xl" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Check-out</label>
                    <input type="date" id="checkout" class="w-full p-3 border rounded-xl" required>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white p-3 rounded-xl font-bold mt-4 transition">
                Enviar Solicitação
            </button>
        </form>
    </div>

    <script>
        // Inicialização do cliente Supabase
        const supabase = supabase.createClient('https://evrkniykafvydnhxycit.supabase.co', 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs');

        document.getElementById('reserva-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Captura dos valores do formulário
            const reservaData = {
                hospede_nome: document.getElementById('nome').value,
                checkin: document.getElementById('checkin').value,
                checkout: document.getElementById('checkout').value,
                status: 'Pendente' // Regra de negócio: toda nova reserva inicia como pendente
            };

            // Inserção na tabela 'reservas'
            const { error } = await supabase.from('reservas').insert([reservaData]);

            if (error) {
                alert('Erro ao enviar solicitação: ' + error.message);
            } else {
                alert('Solicitação de reserva enviada com sucesso! O gestor entrará em contato.');
                document.getElementById('reserva-form').reset();
            }
        });
    </script>
</body>
</html>
