<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Cadastro - Gestor de Pousadas</title>
    <style>
        .bg-fundo-pousada {
            background-image: linear-gradient(rgba(30, 58, 138, 0.8), rgba(30, 58, 138, 0.8)), url('https://investidorsardinha.r7.com/wp-content/uploads/2020/12/tipos-de-empresa-as-7-modalidades-existentes-caracteristicas-e-portes-3-1024x644.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-fundo-pousada flex items-center justify-center h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-2xl w-96 border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Criar Conta</h2>
            <p class="text-gray-500 text-sm mt-2">Comece a gerenciar sua pousada</p>
        </div>

        <div id="success-message" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl mb-5 text-center font-semibold" role="alert">
            Cadastro realizado e logado com sucesso! Redirecionando...
        </div>
        
        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-5 text-center font-semibold" role="alert">
            Erro no cadastro. Tente novamente.
        </div>

        <form id="signup-form" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input id="email" type="email" class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="seu@email.com" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
                <input id="password" type="password" class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••" required>
                <p class="text-xs text-gray-400 mt-1">Mínimo de 6 caracteres.</p>
            </div>
            
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl font-bold text-lg transition duration-300 shadow-lg shadow-green-200">
                Cadastrar Pousada
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-600">Já possui conta? 
                <a href="index.html" class="text-blue-600 font-bold hover:text-blue-800 transition">Faça Login</a>
            </p>
        </div>
    </div>

    <script>
        window.onload = function() {
            const SUPABASE_URL = 'https://evrkniykafvydnhxycit.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_TCHdTjTVsu652onrjqjptw_RUCJaqTs';
            window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            document.getElementById('signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                document.getElementById('success-message').classList.add('hidden');
                document.getElementById('error-message').classList.add('hidden');

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (password.length < 6) {
                    const errorMsg = document.getElementById('error-message');
                    errorMsg.innerText = 'A senha deve ter pelo menos 6 caracteres.';
                    errorMsg.classList.remove('hidden');
                    return;
                }

                // 1. Realiza o Cadastro
                const { data: signUpData, error: signUpError } = await window.supabaseClient.auth.signUp({ 
                    email, 
                    password 
                });

                if (signUpError) {
                    const errorMsg = document.getElementById('error-message');
                    errorMsg.innerText = 'Erro no cadastro: ' + signUpError.message;
                    errorMsg.classList.remove('hidden');
                    console.error('Detalhes do erro:', signUpError);
                    return;
                }

                // 2. Se o cadastro funcionou, faz o login automático imediatamente
                const { data: signInData, error: signInError } = await window.supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (signInError) {
                    // Se o login automático falhar (raro, mas possível se o email não estiver confirmado),
                    // o usuário pode precisar confirmar manualmente, mas avisamos o erro.
                    const errorMsg = document.getElementById('error-message');
                    errorMsg.innerText = 'Cadastro realizado, mas login automático falhou: ' + signInError.message + '. Tente logar manualmente.';
                    errorMsg.classList.remove('hidden');
                    console.error('Erro no login automático:', signInError);
                } else {
                    // Login automático funcionou! O Supabase gera a sessão no LocalStorage.
                    document.getElementById('success-message').innerText = 'Cadastro e login realizados com sucesso! Redirecionando...';
                    document.getElementById('success-message').classList.remove('hidden');
                    
                    // Redireciona para a configuração
                    setTimeout(() => {
                        window.location.href = 'configurar-pousada.html';
                    }, 1000);
                }
            });
        };
    </script>
</body>
</html>
